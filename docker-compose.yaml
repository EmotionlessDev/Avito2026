services:
  app:
    build: .
    container_name: booking_app
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - booking_net

  db:
    image: postgres:15
    container_name: booking_db
    restart: always
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    # volumes:
    #   - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - booking_net

  migrate:
    image: migrate/migrate
    networks:
     - booking_net
    volumes:
     - ./migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
    command: [
      "sh", "-c",
      "sleep 5 && migrate -path /migrations -database postgres://postgres:postgres@db:5432/booking?sslmode=disable up"
    ]

    links: 
     - db


networks:
  booking_net:
    driver: bridge

volumes:
  pg_data:
